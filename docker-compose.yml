services:

  mysql:
    image: mysql:lts
    container_name: bellaapp-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    expose:
      - "3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - bellaapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: bellaapp-backend

    depends_on:
      mysql:
        condition: service_healthy

    env_file:
      - ./backend/.env

    command: sh -c "npx prisma migrate deploy && node dist/app/server.js"

    expose:
      - "3000"

    networks:
      - bellaapp-network

  frontend:
    build:
      context: ./Frontend/bellaapp-frontend
      dockerfile: Dockerfile

    container_name: bellaapp-frontend

    depends_on:
      - backend

    expose:
      - "4173"

    networks:
      - bellaapp-network

  nginx:
    image: nginx:alpine
    container_name: bellaapp-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs

    depends_on:
      - frontend
      - backend

    networks:
      - bellaapp-network

volumes:
  mysql_data:

networks:
  bellaapp-network:
    driver: bridge
