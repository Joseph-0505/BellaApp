services:

  mysql:
    image: mysql:lts
    container_name: bellaapp-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - bellaapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: bellaapp-backend

    depends_on:
      - mysql

    env_file:
      - ./backend/.env

    ports:
      - "3333:3000"

    networks:
      - bellaapp-network

  frontend:
    build:
      context: ./Frontend/bellaapp-frontend
      dockerfile: Dockerfile

    container_name: bellaapp-frontend

    depends_on:
      - backend

    ports:
      - "5173:4173"

    networks:
      - bellaapp-network

volumes:
  mysql_data:

networks:
  bellaapp-network:
    driver: bridge